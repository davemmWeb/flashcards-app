<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo azul redondeado con estética premium de app móvil -->
  <rect width="90" height="90" x="5" y="5" rx="24" fill="#2563eb"/>
  
  <!-- Símbolo de tarjetas apiladas (Flashcards) que representa el aprendizaje -->
  <g fill="#ffffff" opacity="0.4">
    <rect width="40" height="50" x="22" y="20" rx="6" transform="rotate(-10 22 20)"/>
  </g>
  <g fill="#ffffff">
    <rect width="40" height="50" x="38" y="25" rx="6" transform="rotate(5 38 25)"/>
    <!-- Pequeña línea que simula texto dentro de la tarjeta principal -->
    <rect width="20" height="4" x="48" y="48" rx="2" fill="#2563eb"/>
  </g>
</svg>
